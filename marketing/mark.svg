<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="recallit">
  <!-- recallit mark: a card that fills with green (learned) and is checked (honest).
       Parallels the Hallmark Bubble jar: a container with a rising fill. -->
  <defs><clipPath id="rc-card"><rect x="12" y="8" width="40" height="48" rx="10"/></clipPath></defs>
  <g clip-path="url(#rc-card)">
    <rect x="12" y="8" width="40" height="48" fill="#faf6ee"/>
    <path d="M12 39 Q32 32 52 39 V56 H12 Z" fill="#67d29b"/>
  </g>
  <rect x="12" y="8" width="40" height="48" rx="10" fill="none" stroke="#1c1e24" stroke-width="3.4"/>
  <path d="M24 45 l5 5 l9.5 -11.5" fill="none" stroke="#faf6ee" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
