<!doctype html>
<html lang="en" data-theme="hum">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>recallit · app mock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="hum-tokens.css" />
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--color-paper-2); font-family: var(--font-body); color: var(--color-ink); display: grid; place-items: center; min-height: 100dvh; }
    .note { position: fixed; top: 8px; left: 0; right: 0; text-align: center; font-family: var(--font-label); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-muted); z-index: 10; }
    button { font: inherit; cursor: pointer; }
    h1, h2, p, ul { margin: 0; }

    .phone { position: relative; width: min(100vw, 400px); height: min(100dvh, 820px); background: var(--color-paper); overflow: hidden; border: 1px solid var(--color-rule); }
    @media (min-width: 440px) { .phone { border-radius: 40px; box-shadow: 0 40px 80px -30px oklch(20% 0.012 250 / 0.35); border: 10px solid var(--color-ink); } }
    .track { display: flex; width: 200%; height: 100%; transition: transform 340ms var(--ease-out); }
    @media (prefers-reduced-motion: reduce) { .track { transition: none; } }
    .phone[data-screen="session"] .track { transform: translateX(-50%); }
    .screen { width: 50%; height: 100%; display: flex; flex-direction: column; }

    /* ── HOME / DASHBOARD ── */
    .g-top { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.25rem 0.75rem; }
    .brand { display: inline-flex; align-items: center; gap: 0.5em; font-family: var(--font-display); font-weight: 700; font-size: 1.2rem; }
    .mark { width: 20px; height: 20px; border-radius: 6px; background: var(--color-mint); box-shadow: 0 2.5px 0 -0.5px var(--color-mint-deep); }
    .streak { display: inline-flex; align-items: center; gap: 0.3em; padding: 0.35rem 0.7rem; border-radius: 999px; background: var(--tint-pear); color: var(--color-accent-deep); font-family: var(--font-label); font-size: 12px; font-weight: 600; }
    .g-scroll { flex: 1; overflow-y: auto; padding: 0.25rem 1.25rem 1rem; display: grid; gap: 1.4rem; align-content: start; }
    .group { display: grid; gap: 0.8rem; }
    .sec { font-family: var(--font-label); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-muted); padding-left: 0.25rem; }

    .streakcard { background: var(--color-paper); border: 1.5px solid var(--color-rule); border-radius: var(--radius-card); box-shadow: var(--shadow-card); padding: 1.1rem 1.2rem; display: grid; gap: 0.8rem; }
    .week { display: flex; justify-content: space-between; gap: 0.4rem; }
    .day { flex: 1; aspect-ratio: 1; max-width: 38px; display: grid; place-items: center; border-radius: 11px; background: var(--color-paper-2); color: var(--color-muted); font-family: var(--font-label); font-size: 11px; font-weight: 600; }
    .day.done { background: var(--color-mint); color: var(--color-ink); box-shadow: 0 2px 0 -0.5px var(--color-mint-deep); }
    .day.now { background: transparent; color: var(--color-mint-deep); border: 2px solid var(--color-mint-deep); }
    .streakcap { font-size: 0.9rem; color: var(--color-ink-2); }
    .streakcap b { color: var(--color-ink); }

    .stats3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
    .stat3 { background: var(--color-paper); border: 1.5px solid var(--color-rule); border-radius: 16px; padding: 0.95rem 0.4rem; text-align: center; box-shadow: var(--shadow-card); }
    .stat3 b { display: block; font-family: var(--font-display); font-weight: 700; font-size: 1.55rem; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
    .stat3 span { font-family: var(--font-label); font-size: 9.5px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--color-muted); }

    .packs { display: grid; gap: 0.75rem; }
    .pcard { --pc: var(--color-mint); --pc-tint: var(--tint-mint); --pc-deep: var(--color-mint-deep);
      display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 0.9rem;
      width: 100%; text-align: left; padding: 1.05rem 1.2rem; border-radius: var(--radius-card);
      border: 1.5px solid var(--color-rule); background: var(--color-paper); box-shadow: var(--shadow-card); transition: transform 140ms var(--ease-out); }
    .pcard[data-accent="cyan"] { --pc: var(--color-accent-2); --pc-tint: var(--tint-cyan); --pc-deep: var(--color-accent-2-deep); }
    .pcard:active { transform: scale(0.98); }
    .pcard__icon { width: 40px; height: 40px; border-radius: 12px; background: var(--pc-tint); display: grid; place-items: center; }
    .pcard__icon i { width: 13px; height: 13px; border-radius: 4px; background: var(--pc); }
    .pcard__txt { display: grid; gap: 0.15rem; min-width: 0; }
    .pcard__name { font-family: var(--font-display); font-weight: 700; font-size: 1.0625rem; letter-spacing: -0.01em; }
    .pcard__due { font-family: var(--font-label); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--color-muted); }
    .pcard__due b { color: var(--pc-deep); }
    .pcard__go { color: var(--pc-deep); font-size: 1.2rem; }

    .nextup { list-style: none; display: grid; gap: 0.5rem; }
    .nx { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; border-radius: 14px; border: 1.5px solid var(--color-rule); background: var(--color-paper); width: 100%; text-align: left; transition: transform 140ms var(--ease-out); }
    .nx:active { transform: scale(0.99); }
    .nx__dot { width: 9px; height: 9px; border-radius: 999px; flex: 0 0 auto; }
    .nx__dot.mint { background: var(--color-mint); } .nx__dot.cyan { background: var(--color-accent-2); }
    .nx__txt { flex: 1; display: grid; gap: 0.1rem; min-width: 0; }
    .nx__txt b { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nx__txt span { font-family: var(--font-label); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--color-muted); }
    .nx__when { font-family: var(--font-label); font-size: 11px; color: var(--color-mint-deep); flex: 0 0 auto; }

    .talk { margin: 0.4rem 1.25rem calc(1.1rem + env(safe-area-inset-bottom)); display: grid; justify-items: center; gap: 0.35rem; }
    .talk__btn { display: inline-flex; align-items: center; gap: 0.55em; padding: 0.85rem 1.7rem; border-radius: 999px; border: 0; background: var(--color-lavender); color: var(--color-ink); font-family: var(--font-body); font-weight: 700; font-size: 1.0625rem; box-shadow: 0 5px 0 -1px var(--color-lavender-deep), 0 12px 22px -8px oklch(64% 0.18 305 / 0.5); transition: transform 120ms var(--ease-out), box-shadow 120ms; }
    .talk__btn:active { transform: translateY(3px); box-shadow: 0 1px 0 -1px var(--color-lavender-deep); }
    .talk__btn svg { width: 19px; height: 19px; }
    .talk__cap { font-family: var(--font-label); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-muted); }

    /* ── SESSION ── */
    .top { display: flex; align-items: center; gap: 0.75rem; padding: 1.1rem 1.25rem 0.5rem; }
    .x { width: 36px; height: 36px; border: 0; background: transparent; color: var(--color-muted); font-size: 1.1rem; border-radius: 999px; }
    .x:active { background: var(--color-paper-2); }
    .dots { flex: 1; display: flex; justify-content: center; gap: 6px; }
    .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--color-rule-2); opacity: 0.5; transition: all 240ms var(--ease-out); }
    .dot.done { background: var(--color-mint); opacity: 1; }
    .dot.now { background: var(--color-mint-deep); opacity: 1; transform: scale(1.35); }
    .pack { font-family: var(--font-label); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-muted); }
    .stage { flex: 1; display: grid; align-content: center; gap: 1.25rem; padding: 1.5rem; text-align: center; touch-action: pan-y; }
    .eyebrow { font-family: var(--font-label); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-mint-deep); }
    .prompt { font-family: var(--font-display); font-weight: 700; font-size: clamp(1.6rem, 7vw, 2.2rem); line-height: 1.15; letter-spacing: -0.02em; }
    .fb { display: grid; gap: 0.6rem; justify-items: center; min-height: 1px; }
    .you { background: var(--color-paper-2); border: 1.5px solid var(--color-rule); border-radius: 16px; padding: 0.7rem 1.1rem; font-family: var(--font-mono); font-size: 1rem; opacity: 0; transform: translateY(8px); transition: all 260ms var(--ease-out); }
    .you.in { opacity: 1; transform: none; }
    .grade { display: inline-flex; align-items: center; gap: 0.5em; background: var(--tint-mint); border: 1.5px solid var(--color-mint-deep); border-radius: 999px; padding: 0.5rem 1rem; font-size: 0.9rem; opacity: 0; transform: scale(0.9); transition: all 280ms var(--ease-spring); }
    .grade.in { opacity: 1; transform: none; }
    .grade b { font-family: var(--font-display); color: var(--color-mint-deep); }
    .bottom { display: grid; justify-items: center; gap: 0.5rem; padding: 0.5rem 1.5rem calc(1.5rem + env(safe-area-inset-bottom)); }
    .mic { position: relative; width: 92px; height: 92px; border-radius: 999px; border: 0; background: var(--color-mint); color: var(--color-accent-ink); box-shadow: 0 6px 0 -1px var(--color-mint-deep), 0 12px 24px -6px oklch(70% 0.18 150 / 0.5); display: grid; place-items: center; touch-action: none; user-select: none; transition: transform 120ms var(--ease-out), box-shadow 120ms; }
    .mic svg { width: 38px; height: 38px; }
    .mic:active, .mic.rec { transform: translateY(3px); box-shadow: 0 2px 0 -1px var(--color-mint-deep), 0 4px 10px -4px oklch(70% 0.18 150 / 0.5); }
    .mic.rec { background: var(--color-accent-3); box-shadow: 0 2px 0 -1px var(--color-accent-3-deep); }
    .mic.rec::before { content: ""; position: absolute; inset: -10px; border-radius: 999px; border: 3px solid var(--color-accent-3); opacity: 0.5; animation: pulse 1s var(--ease-out) infinite; }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.4); opacity: 0; } }
    .micLabel { font-family: var(--font-label); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-muted); min-height: 1.2em; }
    .typeBtn { background: 0; border: 0; color: var(--color-ink-2); font-size: 0.85rem; text-decoration: underline; text-underline-offset: 3px; }
    .typeRow { display: flex; gap: 0.5rem; width: 100%; max-width: 320px; }
    .typeRow[hidden] { display: none; }
    .typeRow input { flex: 1; min-height: 44px; font-size: 16px; padding: 0 0.9rem; border: 1.5px solid var(--color-rule); border-radius: 999px; background: var(--color-paper); font-family: var(--font-body); }
    .typeRow button { min-height: 44px; padding: 0 1rem; border: 0; border-radius: 999px; background: var(--color-ink); color: var(--color-paper); font-weight: 600; }
    .swipehint { font-family: var(--font-label); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-rule-2); }
    @media (prefers-reduced-motion: reduce) { .mic.rec::before { animation: none; } }
  </style>
</head>
<body>
  <p class="note">mock · home dashboard · tap a pack or item → session · hold the mic · swipe · ✕ home</p>
  <div class="phone" data-screen="gallery">
    <div class="track">

      <!-- HOME / DASHBOARD -->
      <section class="screen gallery">
        <div class="g-top">
          <span class="brand"><span class="mark"></span>recallit</span>
          <span class="streak"><svg class="flame" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="M12 2c4 4 6 7 6 11a6 6 0 0 1-12 0c0-2 1-3.6 2.2-4.9C9.6 10 11 8 12 2Z" fill="#f15f4c"/><path d="M12 9.2c1.9 1.9 2.7 3.4 2.7 5a2.7 2.7 0 0 1-5.4 0c0-1.4 1.1-2.7 2.7-5Z" fill="#edc845"/></svg>5</span>
        </div>
        <div class="g-scroll">
          <div class="streakcard">
            <div class="week">
              <span class="day done">M</span><span class="day done">T</span><span class="day done">W</span><span class="day done">T</span><span class="day now">F</span><span class="day">S</span><span class="day">S</span>
            </div>
            <p class="streakcap"><b>5-day streak.</b> Two more for your record.</p>
          </div>

          <div class="stats3">
            <div class="stat3"><b>10</b><span>due now</span></div>
            <div class="stat3"><b>92%</b><span>kept</span></div>
            <div class="stat3"><b>248</b><span>known</span></div>
          </div>

          <div class="group">
            <p class="sec">Your packs</p>
            <div class="packs">
              <button class="pcard" data-accent="mint" data-pack="Mexican Spanish">
                <span class="pcard__icon"><i></i></span>
                <span class="pcard__txt"><span class="pcard__name">Mexican Spanish</span><span class="pcard__due"><b>7 due</b> · voice</span></span>
                <span class="pcard__go">→</span>
              </button>
              <button class="pcard" data-accent="cyan" data-pack="Learn recallit">
                <span class="pcard__icon"><i></i></span>
                <span class="pcard__txt"><span class="pcard__name">Learn recallit</span><span class="pcard__due"><b>3 due</b> · text</span></span>
                <span class="pcard__go">→</span>
              </button>
            </div>
          </div>

          <div class="group">
            <p class="sec">Next up</p>
            <ul class="nextup">
              <li><button class="nx" data-pack="Mexican Spanish"><span class="nx__dot mint"></span><span class="nx__txt"><b>¿Qué onda?</b><span>Mexican Spanish</span></span><span class="nx__when">now</span></button></li>
              <li><button class="nx" data-pack="Mexican Spanish"><span class="nx__dot mint"></span><span class="nx__txt"><b>Order al pastor, no onions</b><span>Mexican Spanish · from your chat</span></span><span class="nx__when">now</span></button></li>
              <li><button class="nx" data-pack="Learn recallit"><span class="nx__dot cyan"></span><span class="nx__txt"><b>Why is the engine topic-agnostic?</b><span>Learn recallit</span></span><span class="nx__when">2h</span></button></li>
            </ul>
          </div>
        </div>
        <div class="talk">
          <button class="talk__btn" data-pack="Mexican Spanish">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-12.3 7.5L3 21l2-5.7A8.4 8.4 0 1 1 21 11.5Z"/></svg>
            Just talk
          </button>
          <span class="talk__cap">no grading, just practice</span>
        </div>
      </section>

      <!-- SESSION -->
      <section class="screen session">
        <div class="top">
          <button class="x" id="x" aria-label="Back to home">✕</button>
          <div class="dots" id="dots"></div>
          <span class="pack" id="packLabel">Mexican Spanish</span>
        </div>
        <main class="stage" id="stage">
          <p class="eyebrow" id="eyebrow">Recall, in your words</p>
          <h1 class="prompt" id="prompt"></h1>
          <div class="fb" id="fb"></div>
        </main>
        <div class="bottom">
          <button class="mic" id="mic" aria-label="Hold to speak">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>
          </button>
          <p class="micLabel" id="micLabel">Hold to speak</p>
          <button class="typeBtn" id="typeBtn">type instead</button>
          <form class="typeRow" id="typeRow" hidden><input id="typeInput" placeholder="type your answer" autocomplete="off" /><button type="submit" aria-label="Send">↑</button></form>
          <span class="swipehint">← swipe for the next →</span>
        </div>
      </section>

    </div>
  </div>

  <script>
    const prompts = [
      { eyebrow: "Recall, in your words", prompt: "How do you say “you're right”?", answer: "tienes razón", grade: "Good", note: "back in 4 days" },
      { eyebrow: "From your last chat", prompt: "Order al pastor tacos, no onions.", answer: "Me da unos tacos de al pastor, sin cebolla", grade: "Good", note: "back in 6 days" },
      { eyebrow: "You fumbled this one", prompt: "Tell your wife you'll be home late.", answer: "voy a llegar tarde", grade: "Almost", note: "back tomorrow" },
    ];
    const $ = (s) => document.querySelector(s);
    const phone = $(".phone"), dots = $("#dots"), stage = $("#stage"), mic = $("#mic"), micLabel = $("#micLabel"), fb = $("#fb");
    let i = 0, recording = false, busy = false;

    function enter(pack) { $("#packLabel").textContent = pack; i = 0; render(); phone.dataset.screen = "session"; }
    document.querySelectorAll(".pcard, .nx, .talk__btn").forEach((b) => b.addEventListener("click", () => enter(b.dataset.pack)));
    $("#x").addEventListener("click", () => { phone.dataset.screen = "gallery"; });

    function render() {
      const p = prompts[i];
      $("#eyebrow").textContent = p.eyebrow; $("#prompt").textContent = p.prompt; fb.innerHTML = "";
      dots.innerHTML = prompts.map((_, k) => `<span class="dot ${k < i ? "done" : k === i ? "now" : ""}"></span>`).join("");
    }
    function grade() {
      const p = prompts[i], good = p.grade === "Good";
      fb.innerHTML = `<div class="you">“${p.answer}”</div><div class="grade" style="${good ? "" : "background:var(--tint-coral);border-color:var(--color-accent-3-deep)"}"><b style="${good ? "" : "color:var(--color-accent-3-deep)"}">${p.grade}.</b> ${p.note}</div>`;
      requestAnimationFrame(() => { fb.querySelector(".you").classList.add("in"); setTimeout(() => fb.querySelector(".grade").classList.add("in"), 220); });
      busy = true; setTimeout(() => { busy = false; i = (i + 1) % prompts.length; render(); }, 2200);
    }
    function start(e) { if (busy) return; e.preventDefault(); recording = true; mic.classList.add("rec"); micLabel.textContent = "Listening…"; }
    function end() { if (!recording) return; recording = false; mic.classList.remove("rec"); micLabel.textContent = "Checking…"; setTimeout(() => { micLabel.textContent = "Hold to speak"; grade(); }, 700); }
    mic.addEventListener("pointerdown", start);
    mic.addEventListener("pointerup", end);
    mic.addEventListener("pointercancel", end);
    mic.addEventListener("pointerleave", () => { if (recording) end(); });

    let x0 = null;
    stage.addEventListener("pointerdown", (e) => { x0 = e.clientX; });
    stage.addEventListener("pointerup", (e) => { if (x0 == null) return; const dx = e.clientX - x0; x0 = null; if (Math.abs(dx) < 50) return; i = (dx < 0 ? i + 1 : i - 1 + prompts.length) % prompts.length; render(); });

    $("#typeBtn").addEventListener("click", () => { const r = $("#typeRow"); r.hidden = !r.hidden; if (!r.hidden) $("#typeInput").focus(); });
    $("#typeRow").addEventListener("submit", (e) => { e.preventDefault(); if (busy) return; grade(); $("#typeInput").value = ""; });

    render();
  </script>
</body>
</html>
